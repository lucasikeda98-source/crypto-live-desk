name: Quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  deterministic-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run deterministic tests
        run: npm test
