name: Quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deterministic-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run deterministic tests
        run: npm test

  # BLOQUEANTE e independente de Binance: valida boot no Chromium (zero excecoes do app
  # sob falha total de rede), DOM esperado e layout 390px. Complementa a suite deterministica
  # com um gate de navegador que RODA em runner geo-restringido.
  browser-boot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Run browser boot check
        run: node scripts/browser-boot-check.cjs

  # Informativo: runners hospedados do GitHub ficam em regiao onde a Binance
  # responde HTTP 451 (geo-restricao), entao o carregamento completo do painel
  # nao e alcancavel a partir do CI. O gate autoritativo do smoke roda local
  # (npm run test:browser) e contra o deploy, antes de cada release.
  browser-smoke:
    runs-on: windows-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run browser smoke (Edge headless, 1 retry)
        shell: pwsh
        env:
          EDGE_PATH: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
        run: |
          node scripts/browser-smoke.cjs
          if ($LASTEXITCODE -ne 0) {
            Write-Host 'Primeira execucao falhou; tentando novamente (fontes externas podem oscilar).'
            node scripts/browser-smoke.cjs
          }
          exit $LASTEXITCODE
