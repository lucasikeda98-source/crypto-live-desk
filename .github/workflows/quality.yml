name: Quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deterministic-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Audit locked dependencies
        run: npm audit --audit-level=low
      - name: Run deterministic tests with coverage floors
        run: npm run test:coverage

  # Gate de navegador bloqueante. Uma segunda tentativa absorve oscilacao curta das fontes;
  # duas falhas consecutivas bloqueiam o merge em vez de mascarar uma regressao.
  browser-smoke:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Run browser smoke (Edge headless, 1 retry)
        shell: pwsh
        env:
          EDGE_PATH: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
        run: |
          node scripts/browser-smoke.cjs
          if ($LASTEXITCODE -ne 0) {
            Write-Host 'Primeira execucao falhou; tentando novamente (fontes externas podem oscilar).'
            node scripts/browser-smoke.cjs
          }
          exit $LASTEXITCODE
